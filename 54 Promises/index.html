        <h1>Promises</h1>
        <p>A Promise is a JavaScript object that represents the eventual result of an asynchronous operation.

            It acts as a placeholder for a value that may be available now, later, or never.

            Instead of immediately returning the final result, a Promise promises to provide it in the future.</p>
