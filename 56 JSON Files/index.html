<body style="background-color: black; color:aliceblue">
    <h1>JSON (JavaScript Object Notation)</h1>
    <ol>
        <li>Data is stored as key-value pairs.</li>
        <li>Keys must always be inside double quotes ("").</li>
        <li>Values can be:</li>
        <ul>

            <li>String</li>
            <li>Number</li>
            <li>Boolean</li>
            <li>Array</li>
            <li>Object</li>
            <li>null</li>
        </ul>
        <li>No comments are allowed.</li>
        <li>No functions are allowed.</li>
    </ol>
</body>

</html>
